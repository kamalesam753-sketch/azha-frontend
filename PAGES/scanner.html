<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>AZHA Scanner</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#061827">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="AZHA Scanner">
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="../JS/core/config.js"></script>
<style>
*{box-sizing:border-box}

body{
  padding-bottom:90px;

  margin:0;
  min-height:100vh;
  background:#061827;
  color:#fff;
  font-family:Arial,sans-serif;
  overflow:hidden;
}
.app{
  height:100vh;
  display:flex;
  flex-direction:column;
}
.top{
  padding:14px 16px;
  background:linear-gradient(135deg,#082d4b,#0f4c81);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.brand{
  font-weight:900;
  letter-spacing:.05em;
  font-size:16px;
}
.meta{
  font-size:11px;
  color:rgba(255,255,255,.75);
  margin-top:3px;
}
.status{
  padding:10px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.12);
  font-size:12px;
  font-weight:900;
}
.reader-wrap{
  flex:1;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:12px;
}
#reader{
  width:100%;
  max-width:460px;
  overflow:hidden;
  border-radius:26px;
  background:#000;
  border:1px solid rgba(255,255,255,.16);
}
.scan-note{
  position:absolute;
  left:16px;
  right:16px;
  bottom:92px;
  background:rgba(15,76,129,.88);
  border:1px solid rgba(255,255,255,.14);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:14px;
  text-align:center;
  font-weight:900;
  line-height:1.7;
}

.footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;

  padding:12px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;

  background:#061827;
  border-top:1px solid rgba(255,255,255,.08);
  z-index:9999;
}

button{
  border:none;
  border-radius:18px;
  min-height:52px;
  font-weight:900;
  font-size:14px;
}
.primary{background:#1977b5;color:#fff}
.light{background:#edf4fb;color:#0f4c81}
.danger{background:#b91c1c;color:#fff}
.result-valid{background:#16a34a!important}
.result-warning{background:#d97706!important}
.result-invalid{background:#b91c1c!important}

.overlay-result{
  position:fixed;
  inset:0;
  z-index:99999;
  display:none;
  align-items:center;
  justify-content:center;
  padding:22px;
  text-align:center;
  color:#fff;
  animation:popIn .22s ease both;
}
.overlay-result.show{display:flex}
.overlay-result.valid{background:linear-gradient(135deg,#064e3b,#16a34a)}
.overlay-result.warning{background:linear-gradient(135deg,#78350f,#d97706)}
.overlay-result.invalid{background:linear-gradient(135deg,#7f1d1d,#dc2626)}
.overlay-card{
  width:min(420px,100%);
  border-radius:30px;
  padding:28px 22px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.22);
  backdrop-filter:blur(14px);
  box-shadow:0 30px 90px rgba(0,0,0,.32);
}
.overlay-icon{
  font-size:62px;
  margin-bottom:12px;
}
.overlay-title{
  font-size:28px;
  font-weight:900;
  margin-bottom:10px;
}
.overlay-info{
  font-size:15px;
  font-weight:800;
  line-height:1.8;
  opacity:.92;
}
.offline-pill{
  position:fixed;
  top:12px;
  left:12px;
  z-index:9999;
  display:none;
  background:#f97316;
  color:#fff;
  padding:9px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}
.offline-pill.show{display:block}
@keyframes popIn{
  from{opacity:0;transform:scale(.94)}
  to{opacity:1;transform:scale(1)}
}

.footer button{
  min-height:54px;
  border-radius:18px;
  font-size:15px;
  font-weight:900;
}

.primary{
  background:#1977b5;
  color:#fff;
}

.light{
  background:#edf4fb;
  color:#0f4c81;
}

.footer{
  padding-bottom:calc(12px + env(safe-area-inset-bottom))!important;
}
.reader-wrap{
  padding-bottom:88px!important;
}
#reader video{
  object-fit:cover!important;
}
</style>

<style id="azha-final-real-logo-system">
  img[src*="azha-logo-final"]{
    width:auto!important;
    height:58px!important;
    object-fit:contain!important;
    background:transparent!important;
    filter:none!important;
  }

  img[src*="madaar-logo-final"]{
    width:auto!important;
    height:34px!important;
    object-fit:contain!important;
    background:transparent!important;
    filter:none!important;
    opacity:.95!important;
  }

  .azha-brand-header img[src*="azha-logo-final"]{
    height:64px!important;
    max-width:220px!important;
  }

  .logo-chip img[src*="azha-logo-final"],
  .logo-chip img[src*="madaar-logo-final"]{
    filter:none!important;
  }

  @media(max-width:760px){
    img[src*="azha-logo-final"]{
      height:44px!important;
    }

    img[src*="madaar-logo-final"]{
      height:26px!important;
    }

    .azha-brand-header img[src*="azha-logo-final"]{
      height:48px!important;
      max-width:170px!important;
    }
  }
</style>

</head>
<body>

<div id="offlinePill" class="offline-pill">Offline Queue: 0</div>

<div id="overlayResult" class="overlay-result" onclick="hideOverlayAndScan Again()">
  <div class="overlay-card">
    <div class="overlay-icon" id="overlayIcon">✓</div>
    <div class="overlay-title" id="overlayTitle">Verified</div>
    <div class="overlay-info" id="overlayInfo">--</div>
  </div>
</div>

<div class="app">
  <div class="top">
    <div>
      <div class="brand">AZHA SCANNER</div>
      <div class="meta" id="sessionMeta">Secure gate verification</div>
    </div>
    <div class="status" id="statusBadge">Ready</div>
  </div>

  <div class="reader-wrap">
    <div id="reader"></div>
    <div class="scan-note" id="scanNote">وجّه الكاميرا نحو QR الخاص بالعميل</div>
  </div>

  <div class="footer">
    <button class="light" onclick="restartScanner()">Restart</button>
    <button class="danger" onclick="goExit Scanner()">Gate</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  const API_BASE =
    (window.AZHA_CONFIG && (window.AZHA_CONFIG.API_BASE || (window.AZHA_CONFIG.API && window.AZHA_CONFIG.API.BASE_URL))) ||
    "https://azha-backend-production.up.railway.app/api";

  const ROUTES = (window.AZHA_CONFIG && window.AZHA_CONFIG.ROUTES) || {};
  const LOGIN_ROUTE = ROUTES.login || "/login";
  const GATE_ROUTE = ROUTES.gate || "/gate";
  const PERMIT_ROUTE = ROUTES.permitPreview || "/permit";

  let scanner = null;
  let locked = false;
  const OFFLINE_KEY = "azhaOfflineScanQueue";

  function getSessionToken(){
    return localStorage.getItem("sessionToken") || sessionStorage.getItem("sessionToken") || "";
  }

  function getRole(){
    return String(localStorage.getItem("role") || sessionStorage.getItem("role") || "").toLowerCase();
  }

  function allowed(){
    return ["admin","supervisor","guard","scanner"].includes(getRole());
  }

  function beep(type){
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.frequency.value = type === "valid" ? 880 : type === "warning" ? 520 : 220;
      gain.gain.value = 0.08;

      osc.start();
      setTimeout(function(){
        osc.stop();
        ctx.close();
      }, type === "valid" ? 130 : 220);
    }catch(e){}
  }

  function getQueue(){
    try{return JSON.parse(localStorage.getItem(OFFLINE_KEY) || "[]");}
    catch(e){return [];}
  }

  function setQueue(list){
    localStorage.setItem(OFFLINE_KEY, JSON.stringify(list || []));
    updateOfflinePill();
  }

  function updateOfflinePill(){
    const pill = document.getElementById("offlinePill");
    const count = getQueue().length;
    if(!pill) return;
    pill.textContent = "Offline Queue: " + count;
    pill.classList.toggle("show", count > 0 || !navigator.onLine);
  }

  function queueOfflineScan(token){
    const list = getQueue();
    list.push({
      token: token,
      sessionToken: getSessionToken(),
      mode: "pwa_scanner_offline_queue",
      createdAt: new Date().toISOString()
    });
    setQueue(list);
  }

  async function syncOfflineQueue(){
    if(!navigator.onLine) return;
    const list = getQueue();
    if(!list.length) return;

    const remaining = [];

    for(const item of list){
      try{
        const qs = new URLSearchParams({
          action:"scanToken",
          token:item.token,
          sessionToken:item.sessionToken || getSessionToken(),
          mode:item.mode || "pwa_scanner_offline_sync",
          offlineCreatedAt:item.createdAt || "",
          _t:Date.now()
        });

        const res = await fetch(API_BASE + "?" + qs.toString(), {method:"GET", cache:"no-store"});
        const json = await res.json();
        if(!(json && json.success)) remaining.push(item);
      }catch(e){
        remaining.push(item);
      }
    }

    setQueue(remaining);
  }

  function showOverlay(type, title, info){
    const overlay = document.getElementById("overlayResult");
    const icon = document.getElementById("overlayIcon");
    const titleEl = document.getElementById("overlayTitle");
    const infoEl = document.getElementById("overlayInfo");

    if(!overlay) return;

    overlay.className = "overlay-result show " + (type || "invalid");
    icon.textContent = type === "valid" ? "✓" : type === "warning" ? "!" : "✕";
    titleEl.textContent = title || "Result";
    infoEl.innerHTML = info || "";

    beep(type || "invalid");
  }

  window.hideOverlayAndRestart = function(){
    const overlay = document.getElementById("overlayResult");
    if(overlay) overlay.className = "overlay-result";
    window.restartScanner();
  };

  function setStatus(text, cls){
    const badge = document.getElementById("statusBadge");
    const note = document.getElementById("scanNote");
    badge.className = "status " + (cls || "");
    badge.textContent = text || "Ready";
    if(note) note.textContent = text || "جاهز للمسح";
  }

  function extractToken(value){
    const raw = String(value || "").trim();
    try{
      const u = new URL(raw);
      return u.searchParams.get("token") || raw;
    }catch(e){
      const m = raw.match(/[?&]token=([^&]+)/);
      return m ? decodeURIComponent(m[1]) : raw;
    }
  }

  function openPermitApp(token){
    const url =
      PERMIT_ROUTE +
      "?token=" + encodeURIComponent(token) +
      "&mode=security" +
      "&app=1" +
      "&from=scanner" +
      "&sessionToken=" + encodeURIComponent(getSessionToken());

    location.href = url;
  }

  async function onScanSuccess(decodedText){
    if(locked) return;
    locked = true;

    const token = extractToken(decodedText);
    setStatus("Checking...", "");

    try{
      const qs = new URLSearchParams({
        action:"scanToken",
        token:token,
        sessionToken:getSessionToken(),
        mode:"pwa_scanner",
        _t:Date.now()
      });

      const res = await fetch(API_BASE + "?" + qs.toString(), { method:"GET", cache:"no-store" });
      const json = await res.json();

      if(json && json.success){
        const d = json.data || {};
        const cls = String(d.validityClass || "").toLowerCase();

        if(cls === "valid"){
          setStatus("Valid - Opening Permit", "result-valid");
          showOverlay("valid", "Valid Permit", "Permit: " + (d.permitId || "-") + "<br>Unit: " + (d.unit || "-"));
        } else if(cls === "warning"){
          setStatus("Warning - Opening Permit", "result-warning");
          showOverlay("warning", d.validityText || "Warning", "Permit: " + (d.permitId || "-") + "<br>Unit: " + (d.unit || "-"));
        } else {
          setStatus("Invalid - Opening Permit", "result-invalid");
          showOverlay("invalid", d.validityText || "Invalid Permit", "Permit: " + (d.permitId || "-") + "<br>Unit: " + (d.unit || "-"));
        }

        setTimeout(function(){ openPermitApp(token); }, 250);
        return;
      }

      showOverlay("invalid", "Invalid QR", "لم يتم قبول الرمز");
      setStatus("Invalid QR", "result-invalid");
      setTimeout(function(){ locked = false; }, 1800);
    }catch(e){
      queueOfflineScan(token);
      showOverlay("warning", "Offline Saved", "تم حفظ عملية المسح مؤقتًا وسيتم رفعها عند عودة الإنترنت");
      setStatus("Offline - Saved", "result-warning");
      setTimeout(function(){ locked = false; }, 2200);
    }
  }

  async function start(){
    if(!getSessionToken() || !allowed()){
      location.href = LOGIN_ROUTE;
      return;
    }

    document.getElementById("sessionMeta").textContent =
      (localStorage.getItem("sessionUsername") || sessionStorage.getItem("sessionUsername") || "security") +
      " • " +
      (localStorage.getItem("sessionGateName") || sessionStorage.getItem("sessionGateName") || "Gate");

    scanner = new Html5Qrcode("reader");

    await scanner.start(
      { facingMode:"environment" },
      { fps:18, qrbox:{ width:320, height:320 }, aspectRatio:1.0 },
      onScanSuccess,
      function(){}
    );

    setStatus("Ready", "");
  }

  window.restartScanner = async function(){
    locked = false;
    setStatus("Restarting...", "");
    try{
      if(scanner) await scanner.stop();
    }catch(e){}
    document.getElementById("reader").innerHTML = "";
    start().catch(function(){ setStatus("Camera Error", "result-invalid"); });
  };

  window.goGate = async function(){
    try{
      if(scanner) await scanner.stop();
    }catch(e){}
    location.href = "/gate?app=1";
  };

  window.addEventListener("online", syncOfflineQueue);
  window.addEventListener("offline", updateOfflinePill);
  updateOfflinePill();
  syncOfflineQueue();

  start().catch(function(){
    setStatus("Camera Permission Required", "result-invalid");
  });
})();
</script>
</body>
</html>
