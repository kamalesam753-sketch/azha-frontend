<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azha Permit Card</title>
  <link rel="stylesheet" href="../STYLES/main.css">

  <style>
    :root {
      --blue1:#082d4b;
      --blue2:#0f4c81;
      --blue3:#1977b5;
      --gold:#d4af37;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e7eef6;
      --soft:#edf4fb;
      --white:#ffffff;
      --shadow:0 24px 70px rgba(0,0,0,.22);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      padding:20px;
      font-family:Arial,sans-serif;
      direction:rtl;
      color:var(--text);
      min-height:100vh;
      background-image:url('../ASSETS/bg-light.png');
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(5,10,18,.70);
      z-index:0;
      pointer-events:none;
    }

    #app,.azha-brand-header{position:relative;z-index:1}

    .azha-brand-header{
      max-width:920px;
      margin:0 auto 22px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:14px 22px;
      background:rgba(255,255,255,.10);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,.13);
      border-bottom:1px solid rgba(212,175,55,.45);
      border-radius:24px;
      box-shadow:0 18px 44px rgba(0,0,0,.20);
    }

    .azha-brand-header img{
      height:44px;
      width:auto;
      object-fit:contain;
    }

    .azha-brand-title{
      color:#fff;
      text-align:right;
      display:flex;
      flex-direction:column;
      gap:3px;
    }

    .azha-brand-title strong{
      font-size:15px;
      font-weight:900;
      letter-spacing:.04em;
    }

    .azha-brand-title span{
      font-size:11px;
      color:rgba(255,255,255,.74);
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .wrap{max-width:920px;margin:auto}

    .card,.loading-card,.error-card{
      position:relative;
      overflow:hidden;
      background:#fff;
      border:1px solid rgba(255,255,255,.35);
      border-radius:34px;
      box-shadow:var(--shadow);
    }

    .card::after,.loading-card::after,.error-card::after{
      content:"AZHA";
      position:absolute;
      right:18px;
      bottom:8px;
      font-size:108px;
      line-height:1;
      font-weight:900;
      letter-spacing:.08em;
      color:#0b3558;
      opacity:.035;
      pointer-events:none;
      z-index:0;
    }

    .card>*,
    .loading-card>*,
    .error-card>*{position:relative;z-index:1}

    .madaar-card-logo{
      position:absolute;
      top:18px;
      left:20px;
      height:24px;
      width:auto;
      object-fit:contain;
      opacity:.74;
      z-index:5;
      pointer-events:none;
    }

    .hero{
      position:relative;
      overflow:hidden;
      text-align:center;
      color:#fff;
      padding:38px 24px 32px;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.18), transparent 28%),
        linear-gradient(135deg,var(--blue1),var(--blue2) 60%,var(--blue3));
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg,transparent 0%,rgba(255,255,255,.08) 42%,transparent 72%);
      animation:shine 8s linear infinite;
    }

    .hero::after{
      content:"AZHA";
      position:absolute;
      inset:auto 0 8px 0;
      text-align:center;
      font-size:76px;
      font-weight:900;
      color:rgba(255,255,255,.06);
      pointer-events:none;
    }

    .hero h1{
      margin:0;
      font-size:32px;
      font-weight:900;
      letter-spacing:.02em;
    }

    .hero p{
      margin:9px 0 0;
      line-height:1.8;
      opacity:.96;
      font-weight:700;
    }

    .secure-strip{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:8px;
      padding:14px 18px;
      background:#f8fafc;
      border-bottom:1px solid #edf2f7;
    }

    .secure-chip{
      padding:8px 12px;
      border-radius:999px;
      background:#edf4fb;
      color:#0f4c81;
      font-size:12px;
      font-weight:900;
      border:1px solid #dce8f4;
    }

    .permit-id{
      margin:20px;
      padding:14px 18px;
      border-radius:999px;
      text-align:center;
      background:#edf4fb;
      border:1px solid #dce8f4;
      color:#0f4c81;
      font-weight:900;
      font-size:18px;
      word-break:break-word;
    }

    .status-pill{
      margin:0 20px 14px;
      padding:17px;
      border-radius:20px;
      text-align:center;
      font-size:23px;
      font-weight:900;
    }

    .valid{background:#eaf8ee;color:#166534}
    .warning{background:#fff8e6;color:#92400e}
    .invalid,.not_found{background:#fdecec;color:#b91c1c}

    .validity-note{
      margin:0 20px 18px;
      padding:15px 16px;
      border-radius:18px;
      background:#f8fafc;
      border:1px solid #eef2f7;
      text-align:center;
      color:#475569;
      font-size:14px;
      line-height:1.9;
      font-weight:800;
    }

    .countdown-box{
      margin:0 20px 18px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }

    .count-card{
      background:#0f172a;
      color:#fff;
      border-radius:18px;
      padding:14px;
      text-align:center;
      box-shadow:0 12px 28px rgba(15,23,42,.12);
    }

    .count-card .k{
      font-size:11px;
      color:rgba(255,255,255,.7);
      font-weight:800;
      margin-bottom:5px;
      text-transform:uppercase;
    }

    .count-card .v{
      font-size:21px;
      font-weight:900;
    }

    .badges{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      justify-content:center;
      margin:0 20px 16px;
    }

    .badge{
      padding:8px 12px;
      border-radius:999px;
      background:#f1f5f9;
      color:#334155;
      font-size:12px;
      font-weight:900;
      border:1px solid #e2e8f0;
    }

    .qr-box{text-align:center;margin:20px}

    .qr-frame{
      display:inline-block;
      min-width:292px;
      background:#fff;
      border:1px solid #e6eef6;
      border-radius:28px;
      padding:20px;
      box-shadow:0 18px 44px rgba(15,76,129,.12);
    }

    #qrcode{
      width:246px;
      min-height:246px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:auto;
      border-radius:18px;
      overflow:hidden;
    }

    #qrcode img,#qrcode canvas{
      max-width:246px;
      max-height:246px;
      display:block;
      margin:auto;
    }

    .qr-title{
      margin-top:12px;
      font-size:13px;
      color:#0f4c81;
      font-weight:900;
    }

    .qr-caption{
      margin-top:6px;
      color:#64748b;
      font-size:12px;
      font-weight:800;
      line-height:1.7;
    }

    .token-line{
      margin-top:10px;
      font-size:10.5px;
      color:#94a3b8;
      word-break:break-all;
      direction:ltr;
      text-align:center;
    }

    .grid{
      padding:20px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .item{
      padding:15px;
      border-radius:19px;
      background:#f8fafc;
      border:1px solid #eef2f7;
    }

    .label{
      font-size:12px;
      color:#64748b;
      margin-bottom:6px;
      font-weight:800;
    }

    .value{
      font-size:17px;
      font-weight:900;
      word-break:break-word;
      line-height:1.5;
    }

    .note{
      margin:0 20px 20px;
      padding:15px;
      border-radius:16px;
      background:#f9fbfd;
      border:1px solid #eef2f7;
      text-align:center;
      font-size:14px;
      line-height:1.9;
      font-weight:800;
      color:#475569;
    }

    .actions{
      padding:0 20px 20px;
      text-align:center;
    }

    .btn{
      border:none;
      cursor:pointer;
      margin:6px;
      padding:13px 19px;
      border-radius:15px;
      font-weight:900;
      transition:.15s ease;
    }

    .btn:hover{transform:translateY(-1px)}

    .primary{background:linear-gradient(135deg,#0b3558,#0f4c81);color:#fff}
    .light{background:#edf4fb;color:#0f4c81}
    .share{background:#16a34a;color:#fff}
    .dark{background:#0f172a;color:#fff}
    .whatsapp{background:#22c55e;color:#fff}

    .feedback{
      text-align:center;
      min-height:24px;
      margin-top:5px;
      font-size:13px;
      font-weight:900;
      color:#166534;
    }

    .time{
      text-align:center;
      padding:0 20px 22px;
      font-size:12px;
      font-weight:800;
      color:#64748b;
    }

    .loading-wrap,.error-wrap{
      max-width:780px;
      margin:auto;
    }

    .loading-card{
      text-align:center;
      padding:48px 24px;
    }

    .loading-title{
      color:#0f4c81;
      font-size:23px;
      font-weight:900;
    }

    .loading-sub{
      margin-top:10px;
      color:#64748b;
      line-height:1.9;
      font-weight:800;
    }

    .spinner{
      width:46px;
      height:46px;
      border:4px solid #e5edf5;
      border-top-color:#1977b5;
      border-radius:50%;
      margin:0 auto 18px;
      animation:spin .8s linear infinite;
    }

    .error-head{
      background:linear-gradient(135deg,#7f1d1d,#dc2626);
      color:#fff;
      padding:32px 24px;
      text-align:center;
    }

    .error-head h1{margin:0;font-size:28px}

    .error-body{
      padding:28px 24px;
      text-align:center;
    }

    .error-msg{
      font-size:18px;
      font-weight:900;
      margin-bottom:10px;
    }

    .error-sub{
      color:#64748b;
      line-height:1.8;
      font-size:14px;
      font-weight:800;
    }

    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes shine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

    @media(max-width:700px){
      body{padding:15px}
      .azha-brand-header{padding:12px 14px}
      .azha-brand-header img{height:34px}
      .azha-brand-title strong{font-size:12px}
      .azha-brand-title span{font-size:9px}
      .hero h1{font-size:26px}
      .grid,.countdown-box{grid-template-columns:1fr}
      .card::after,.loading-card::after,.error-card::after{font-size:64px}
    }

    @media print{
      body{background:#fff;padding:0}
      body::before,.azha-brand-header,.actions,.feedback,.madaar-card-logo{display:none}
      .card{box-shadow:none;border:none;border-radius:0}
      .hero{print-color-adjust:exact;-webkit-print-color-adjust:exact}
    }
  
    /* AZHA FINAL COMPACT CLIENT CARD - NO DOWNGRADE */
    .wrap{max-width:680px !important;}
    .azha-brand-header{max-width:680px !important;margin-bottom:14px !important;padding:12px 18px !important;border-radius:20px !important;}
    .card,.loading-card,.error-card{border-radius:28px !important;}
    .hero{padding:26px 18px 22px !important;}
    .hero h1{font-size:26px !important;}
    .hero p{font-size:13px !important;margin-top:6px !important;}
    .secure-strip{padding:12px 14px !important;}
    .secure-chip{padding:7px 11px !important;font-size:11px !important;}
    .permit-id{margin:16px !important;padding:11px 14px !important;font-size:15px !important;}
    .status-pill{margin:0 16px 12px !important;padding:14px !important;font-size:19px !important;}
    .validity-note{margin:0 16px 14px !important;padding:12px 14px !important;font-size:13px !important;}
    .countdown-box{margin:0 16px 14px !important;gap:8px !important;}
    .count-card{padding:12px !important;border-radius:16px !important;}
    .count-card .v{font-size:18px !important;}
    .qr-box{margin:14px 16px !important;}
    .qr-frame{min-width:238px !important;padding:16px !important;border-radius:24px !important;}
    #qrcode{width:200px !important;min-height:200px !important;}
    #qrcode img,#qrcode canvas{max-width:200px !important;max-height:200px !important;}
    .grid{padding:16px !important;gap:10px !important;}
    .item{padding:12px !important;border-radius:16px !important;}
    .value{font-size:15px !important;}
    .note{margin:0 16px 16px !important;padding:13px !important;font-size:13px !important;}
    .actions{padding:0 16px 16px !important;}
    .btn{padding:11px 15px !important;border-radius:13px !important;}
  </style>
</head>

<body>
  <header class="azha-brand-header">
    <img src="../ASSETS/azha-logo.png" alt="Azha Logo"
      onerror="this.src='../ASSETS/azha_logo_transparent.png'">
    <div class="azha-brand-title">
      <strong>AZHA Enterprise Security System</strong>
      <span>Community Security Operating System</span>
    </div>
  </header>

  <div id="app">
    <div class="loading-wrap">
      <div class="loading-card">
        <img class="madaar-card-logo" src="../ASSETS/madaar-logo.png" alt="Madaar Logo"
          onerror="this.src='../ASSETS/madaar_logo_transparent.png'">
        <div class="spinner"></div>
        <div class="loading-title">Loading Card / جاري تحميل البطاقة</div>
        <div class="loading-sub">Please wait while the system loads the secure permit card.</div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="../JS/core/config.js"></script>

  <script>
    (function () {
      "use strict";

      const params = new URLSearchParams(location.search);
      const token = (params.get("token") || "").trim();
      const MAX_RETRIES = 2;
      let retryCount = 0;

      const API_BASE =
        (window.AZHA_CONFIG && (AZHA_CONFIG.API_BASE || (AZHA_CONFIG.API && AZHA_CONFIG.API.BASE_URL))) ||
        "https://azha-backend-production.up.railway.app/api";

      const AzhaClientCardService = {
        getPermit: async function (permitToken) {
          const qs = new URLSearchParams({
            action: "getClientPermit",
            token: permitToken,
            _t: Date.now()
          });

          const res = await fetch(API_BASE + "?" + qs.toString(), {
            method: "GET",
            cache: "no-store"
          });

          return res.json();
        },

        buildInternalVerificationUrl: function (secureToken) {
          return location.origin + "/permit?token=" + encodeURIComponent(secureToken);
        }
      };

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function normalizeArabic(value) {
        return String(value || "")
          .trim()
          .toLowerCase()
          .replace(/\s+/g, " ")
          .replace(/[أإآ]/g, "ا")
          .replace(/ة/g, "ه")
          .replace(/ى/g, "ي");
      }

      function isUnpaid(value) {
        const v = normalizeArabic(value);
        return v.includes("لم يتم الدفع") || v.includes("غير مدفوع") || v.includes("غير مسدد") || v.includes("unpaid");
      }

      function isLastValidDay(value) {
        return normalizeArabic(value).includes("اخر يوم ساري");
      }

      function isStartsTomorrow(value) {
        return normalizeArabic(value).includes("يبدا غدا");
      }

      function isNotStarted(value) {
        return normalizeArabic(value).includes("لم يبدا");
      }

      function safeCssClass(value) {
        const v = String(value || "").toLowerCase();
        if (v === "valid" || v === "warning" || v === "invalid" || v === "not_found") return v;
        return "invalid";
      }

      function renderError(message) {
        document.getElementById("app").innerHTML = `
          <div class="error-wrap">
            <div class="error-card">
              <img class="madaar-card-logo" src="../ASSETS/madaar-logo.png" alt="Madaar Logo"
                onerror="this.src='../ASSETS/madaar_logo_transparent.png'">
              <div class="error-head">
                <h1>تعذر تحميل البطاقة</h1>
              </div>
              <div class="error-body">
                <div class="error-msg">${escapeHtml(message || "تعذر تحميل البطاقة")}</div>
                <div class="error-sub">يرجى التحقق من الرابط أو طلب البطاقة مرة أخرى.</div>
              </div>
            </div>
          </div>
        `;
      }

      window.setFeedback = function (message, color) {
        const box = document.getElementById("feedbackBox");
        if (box) {
          box.textContent = message || "";
          box.style.color = color || "#166534";
        }
      };

      async function copyText(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
          return true;
        }

        const temp = document.createElement("textarea");
        temp.value = text;
        temp.setAttribute("readonly", "readonly");
        temp.style.position = "fixed";
        temp.style.left = "-9999px";
        document.body.appendChild(temp);
        temp.select();

        let copied = false;
        try { copied = document.execCommand("copy"); } catch (e) { copied = false; }
        document.body.removeChild(temp);
        return copied;
      }

      window.copyLink = function () {
        copyText(location.href)
          .then(ok => window.setFeedback(ok ? "تم نسخ الرابط" : "تعذر نسخ الرابط", ok ? "#166534" : "#b91c1c"))
          .catch(() => window.setFeedback("تعذر نسخ الرابط على هذا الجهاز", "#b91c1c"));
      };

      window.shareLink = function () {
        if (navigator.share) {
          navigator.share({
            title: "Azha Permit Card",
            text: "Azha Permit Card",
            url: location.href
          }).then(() => window.setFeedback("تم فتح نافذة المشاركة", "#166534")).catch(() => {});
        } else {
          window.copyLink();
          window.setFeedback("تم نسخ الرابط للمشاركة", "#166534");
        }
      };

      window.shareWhatsapp = function () {
        const text = encodeURIComponent("Azha Permit Card: " + location.href);
        window.open("https://wa.me/?text=" + text, "_blank");
      };

      window.openInNewTab = function () {
        window.open(location.href, "_blank");
      };

      function drawQr(value) {
        const holder = document.getElementById("qrcode");
        if (!holder) return;

        holder.innerHTML = "";

        if (!value || typeof QRCode === "undefined") {
          holder.innerHTML = "<div style='font-size:13px;color:#64748b;font-weight:900;'>QR غير متاح</div>";
          return;
        }

        new QRCode(holder, {
          text: value,
          width: 200,
          height: 200,
          correctLevel: QRCode.CorrectLevel.H
        });
      }

      function buildBadges(data) {
        let badges = "";
        const payment = data.paymentArabic || "";
        const status = data.statusArabic || "";

        if (isUnpaid(payment)) badges += `<div class="badge">Payment Review</div>`;
        if (isLastValidDay(status)) badges += `<div class="badge">Last Valid Day</div>`;
        if (isStartsTomorrow(status)) badges += `<div class="badge">Starts Tomorrow</div>`;
        if (isNotStarted(status)) badges += `<div class="badge">Not Started Yet</div>`;

        if (!badges) badges = `<div class="badge">Secured Token</div><div class="badge">Internal Verification</div>`;
        return badges;
      }

      function daysUntil(dateValue) {
        if (!dateValue) return "-";
        const now = new Date();
        now.setHours(0,0,0,0);
        const end = new Date(dateValue);
        end.setHours(0,0,0,0);
        const diff = Math.ceil((end - now) / (1000 * 60 * 60 * 24));
        if (Number.isNaN(diff)) return "-";
        return diff < 0 ? "Expired" : String(diff);
      }

      function renderCard(d) {
        const badges = buildBadges(d);
        const secureToken = d.secureToken || token;
        const qrTarget = AzhaClientCardService.buildInternalVerificationUrl(secureToken);
        const validityClass = safeCssClass(d.validityClass);
        const remainingDays = daysUntil(d.endDate);

        document.getElementById("app").innerHTML = `
          <div class="wrap">
            <div class="card">
              <img class="madaar-card-logo" src="../ASSETS/madaar-logo.png" alt="Madaar Logo"
                onerror="this.src='../ASSETS/madaar_logo_transparent.png'">

              <div class="hero">
                <h1>Permit Card</h1>
                <p>بطاقة تصريح الإيجار قصير المدة / Short Term Rent Permit</p>
              </div>

              <div class="secure-strip">
                <div class="secure-chip">AZHA SECURE CARD</div>
                <div class="secure-chip">TOKEN BASED</div>
                <div class="secure-chip">SECURITY VERIFICATION</div>
              </div>

              <div class="permit-id">Permit ID / رقم التصريح: ${escapeHtml(d.permitId)}</div>

              <div class="status-pill ${escapeHtml(validityClass)}">
                ${escapeHtml(d.validityText)}
              </div>

              <div class="validity-note">
                ${escapeHtml(d.validityNote || "يرجى إبراز هذه البطاقة عند الطلب.")}
              </div>

              <div class="countdown-box">
                <div class="count-card">
                  <div class="k">Start</div>
                  <div class="v">${escapeHtml(d.startDate || "-")}</div>
                </div>
                <div class="count-card">
                  <div class="k">End</div>
                  <div class="v">${escapeHtml(d.endDate || "-")}</div>
                </div>
                <div class="count-card">
                  <div class="k">Days Left</div>
                  <div class="v">${escapeHtml(remainingDays)}</div>
                </div>
              </div>

              <div class="badges">${badges}</div>

              <div class="qr-box">
                <div class="qr-frame">
                  <div id="qrcode"></div>
                  <div class="qr-title">Secure Verification Token</div>
                  <div class="qr-caption">
                    هذا الرمز مخصص للتحقق من خلال النظام الداخلي فقط<br>
                    Scan only via AZHA Security System
                  </div>
                  <div class="token-line">${escapeHtml(secureToken)}</div>
                </div>
              </div>

              <div class="grid">
                <div class="item">
                  <div class="label">Unit / الوحدة</div>
                  <div class="value">${escapeHtml(d.unit || "-")}</div>
                </div>

                <div class="item">
                  <div class="label">Tenant / المستأجر</div>
                  <div class="value">${escapeHtml(d.tenant || "-")}</div>
                </div>

                <div class="item">
                  <div class="label">Guests Count / عدد الأفراد</div>
                  <div class="value">${escapeHtml(d.tenantCount || "-")}</div>
                </div>

                <div class="item">
                  <div class="label">Payment / السداد</div>
                  <div class="value">${escapeHtml(d.paymentArabic || "-")}</div>
                </div>

                <div class="item">
                  <div class="label">Phone / الهاتف</div>
                  <div class="value">${escapeHtml(d.phone || "-")}</div>
                </div>

                <div class="item">
                  <div class="label">Car Plate / رقم السيارة</div>
                  <div class="value">${escapeHtml(d.carPlate || "-")}</div>
                </div>
              </div>

              <div class="note">
                هذه البطاقة مخصصة للعرض فقط، ويتم التحقق الكامل من خلال فريق الأمن.<br>
                This card is for display only. Full verification is performed by the security team.
              </div>

              <div class="actions">
                <button class="btn primary" onclick="window.print()">Print / PDF</button>
                <button class="btn light" onclick="copyLink()">Copy Link</button>
                <button class="btn share" onclick="shareLink()">Share</button>
                <button class="btn whatsapp" onclick="shareWhatsapp()">WhatsApp</button>
                <button class="btn dark" onclick="openInNewTab()">Open Full Screen</button>
                <div id="feedbackBox" class="feedback"></div>
              </div>

              <div class="time">
                Last Update / آخر تحديث: ${escapeHtml(new Date().toLocaleString())}
              </div>
            </div>
          </div>
        `;

        drawQr(qrTarget);
      }

      function loadClientCard() {
        if (!token) {
          renderError("Secure token is missing.");
          return;
        }

        AzhaClientCardService.getPermit(token)
          .then(res => {
            if (!res || !res.success || !res.data) {
              renderError((res && res.message) || "تعذر تحميل البطاقة");
              return;
            }
            renderCard(res.data);
          })
          .catch(() => {
            if (retryCount < MAX_RETRIES) {
              retryCount += 1;
              setTimeout(loadClientCard, 700);
              return;
            }
            renderError("حدث خطأ أثناء تحميل البطاقة");
          });
      }

      loadClientCard();
    })();
  </script>
</body>
</html>
