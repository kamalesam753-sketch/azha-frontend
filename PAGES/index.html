<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Azha Permit Verification</title>
<link rel="stylesheet" href="../STYLES/main.css">
<style>
:root{
  --blue1:#082d4b;
  --blue2:#0f4c81;
  --blue3:#1977b5;
  --text:#0f172a;
  --muted:#64748b;
  --line:#e7eef6;
  --soft:#edf4fb;
  --shadow:0 18px 40px rgba(15,76,129,.12);
}
*{box-sizing:border-box}
body{
  font-family:Arial,sans-serif;
  margin:0;
  padding:24px;
  background-image:url('../ASSETS/bg-light.png');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  direction:rtl;
  color:var(--text);
  position:relative;
  min-height:100vh;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(5,10,18,0.65);
  z-index:0;
  pointer-events:none;
}
.azha-brand-header{
  position:sticky;
  top:0;
  z-index:10;
  width:100%;
  max-width:1040px;
  margin:0 auto 22px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:14px 22px;
  background:rgba(255,255,255,0.10);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.12);
  border-bottom:1px solid rgba(212,175,55,0.45);
  border-radius:22px;
  box-shadow:0 18px 40px rgba(0,0,0,0.18);
}
.azha-brand-header img{
  height:40px;
  width:auto;
  object-fit:contain;
  display:block;
}
.azha-brand-title{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:3px;
  color:#fff;
  text-align:right;
}
.azha-brand-title strong{
  font-size:15px;
  font-weight:800;
  letter-spacing:.04em;
}
.azha-brand-title span{
  font-size:11px;
  color:rgba(255,255,255,.72);
  letter-spacing:.08em;
  text-transform:uppercase;
}
#app{
  position:relative;
  z-index:1;
}
.shell{max-width:1040px;margin:auto}
.card{
  position:relative;
  background:#fff;
  border-radius:32px;
  overflow:hidden;
  box-shadow:var(--shadow);
  border:1px solid var(--line);
}
.madaar-card-logo{
  position:absolute;
  top:16px;
  left:18px;
  height:22px;
  width:auto;
  object-fit:contain;
  opacity:.7;
  z-index:4;
  pointer-events:none;
}
.watermark{
  position:absolute;
  inset:auto 0 100px 0;
  text-align:center;
  font-size:88px;
  font-weight:800;
  color:rgba(15,76,129,.04);
  transform:rotate(-15deg);
  pointer-events:none;
}
.card::after,
.loading-card::after,
.error-card::after{
  content:"AZHA";
  position:absolute;
  inset:auto 18px 8px auto;
  font-size:96px;
  line-height:1;
  font-weight:900;
  letter-spacing:.08em;
  color:#0b3558;
  opacity:.03;
  z-index:0;
  pointer-events:none;
}
.card > *,
.loading-card > *,
.error-card > *{
  position:relative;
  z-index:1;
}
.header{
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at top right, rgba(255,255,255,.16), transparent 26%),
    linear-gradient(135deg,var(--blue1),var(--blue2) 60%, var(--blue3));
  color:#fff;
  padding:32px 30px 24px;
}
.badge-top{
  display:inline-block;
  padding:8px 14px;
  background:rgba(255,255,255,.12);
  border-radius:999px;
  font-size:13px;
  margin-bottom:12px;
  border:1px solid rgba(255,255,255,.14);
}
.header h1{margin:0;font-size:30px}
.sub{margin-top:8px;font-size:15px;opacity:.97;line-height:1.7}
.scan-line{
  height:3px;
  background:linear-gradient(90deg,transparent,#22c55e,transparent);
  animation:scan 2s linear infinite;
}
@keyframes scan{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}
.validity{
  margin:20px;
  border-radius:22px;
  padding:22px 18px;
  text-align:center;
  font-weight:800;
  font-size:28px;
}
.valid{background:#eaf8ee;color:#166534}
.warning{background:#fff8e6;color:#92400e}
.invalid,.not_found{background:#fdecec;color:#b91c1c}
.note-box{
  margin:0 20px 18px;
  background:#f8fafc;
  border:1px solid #eef2f7;
  border-radius:18px;
  padding:14px 16px;
  text-align:center;
  font-size:14px;
  color:#475569;
  line-height:1.8;
  font-weight:700;
}
.badges{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  padding:0 20px 15px;
  justify-content:center;
}
.badge{
  background:#f1f5f9;
  padding:8px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  padding:20px;
}
.item{
  background:#f8fafc;
  border-radius:18px;
  padding:16px;
  border:1px solid #eef2f7;
}
.label{
  font-size:13px;
  color:#6b7280;
  margin-bottom:6px;
  font-weight:700;
}
.value{
  font-size:20px;
  font-weight:800;
  word-break:break-word;
}
.meta{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  padding-bottom:10px;
}
.meta-pill{
  background:#f8fafc;
  border:1px solid #eef2f7;
  padding:8px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}
.actions{
  display:flex;
  gap:10px;
  padding:20px;
  flex-wrap:wrap;
}
.btn{
  flex:1;
  min-width:150px;
  padding:14px;
  border-radius:16px;
  border:none;
  cursor:pointer;
  font-weight:800;
  transition:.15s;
}
.btn:hover{transform:translateY(-2px)}
.primary{background:linear-gradient(135deg,#0b3558,#0f4c81);color:#fff}
.light{background:#edf4fb;color:#0f4c81}
.soft{background:#f8fafc;color:#334155;border:1px solid #e2e8f0}
.time{
  text-align:center;
  padding:0 20px 20px;
  font-size:13px;
  color:#64748b;
}
.error-wrap{max-width:840px;margin:auto}
.error-card{
  position:relative;
  background:#fff;
  border-radius:30px;
  overflow:hidden;
  box-shadow:var(--shadow);
  border:1px solid var(--line);
}
.error-head{background:linear-gradient(135deg,#7f1d1d,#dc2626);color:#fff;padding:30px 24px}
.error-head h1{margin:0;font-size:28px}
.error-body{padding:28px 24px;text-align:center}
.error-msg{font-size:18px;font-weight:800;margin-bottom:10px}
.error-sub{color:#64748b;line-height:1.8;font-size:14px}
.loading-wrap{
  max-width:840px;
  margin:auto;
}
.loading-card{
  position:relative;
  background:#fff;
  border-radius:30px;
  overflow:hidden;
  box-shadow:var(--shadow);
  border:1px solid var(--line);
  text-align:center;
  padding:46px 24px;
}
.loading-title{
  font-size:22px;
  font-weight:800;
  color:#0f4c81;
}
.loading-sub{
  margin-top:10px;
  color:#64748b;
  line-height:1.8;
}
@media(max-width:700px){
  body{padding:16px}
  .azha-brand-header{
    padding:12px 14px;
    margin-bottom:16px;
  }
  .azha-brand-header img{height:34px}
  .azha-brand-title strong{font-size:12px}
  .azha-brand-title span{font-size:9px}
  .grid{grid-template-columns:1fr}
  .header h1{font-size:25px}
  .validity{font-size:24px}
  .card::after,
  .loading-card::after,
  .error-card::after{
    font-size:62px;
  }
}
</style>

<script id="azha-token-sanitizer">
(function(){
  const params = new URLSearchParams(location.search);
  const raw = params.get("token") || "";
  const match = raw.match(/AZHASEC-[A-Za-z0-9-]+/);
  if(match && raw !== match[0]){
    params.set("token", match[0]);
    history.replaceState(null, "", location.pathname + "?" + params.toString());
  }
})();
</script>

<body>

<header class="azha-brand-header">
  <img src="../ASSETS/azha-logo-final.png" alt="Azha Logo">
  <div class="azha-brand-title">
    <strong>AZHA Enterprise Security System</strong>
    <span>Community Security Operating System</span>
  </div>
</header>

<div id="app">
  <div class="loading-wrap">
    <div class="loading-card">
      <img class="madaar-card-logo" src="../ASSETS/madaar-logo-final.png" alt="Madaar Logo">
      <div class="loading-title">Loading Permit / جاري تحميل التصريح</div>
      <div class="loading-sub">Please wait while the system verifies secure token access.</div>
    </div>
  </div>
</div>

<script src="../JS/core/config.js"></script>
<script src="../JS/core/auth.js"></script>
<script src="../JS/api/client.js"></script>

<script>
(function(){
  "use strict";

  const params = new URLSearchParams(location.search);
  const secureToken = (params.get("token") || "").trim();
  const rawMode = (params.get("mode") || "security").toLowerCase();
  const pageMode = resolvePageMode(rawMode);

  const AzhaPermitService = {
    scanToken: function(token, mode){
      if (!window.AzhaApi || typeof AzhaApi.get !== "function") {
        return Promise.reject(new Error("API layer is not available"));
      }

      return AzhaApi.get({
        action: "scanToken",
        token: token,
        mode: mode,
        source: "permit_verification_page"
      });
    }
  };

  function resolvePageMode(mode){
    return mode === "preview" ? "preview" : "security";
  }

  function getSessionToken(){
    if (window.AzhaAuth && typeof AzhaAuth.getToken === "function") {
      return AzhaAuth.getToken();
    }
    return "";
  }

  function getRole(){
    if (window.AzhaAuth && typeof AzhaAuth.getRole === "function") {
      return AzhaAuth.getRole();
    }
    return "";
  }

  function escapeHtml(value){
    return String(value || "")
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#039;");
  }

  function normalizeArabic(value){
    return String(value || "")
      .trim()
      .toLowerCase()
      .replace(/\s+/g, " ")
      .replace(/[أإآ]/g, "ا")
      .replace(/ة/g, "ه")
      .replace(/ى/g, "ي");
  }

  function isUnpaid(value){
    const v = normalizeArabic(value);
    return v.includes("لم يتم الدفع") || v.includes("غير مدفوع") || v.includes("غير مسدد");
  }

  function isLastValidDay(value){
    return normalizeArabic(value).includes("اخر يوم ساري");
  }

  function isStartsTomorrow(value){
    return normalizeArabic(value).includes("يبدا غدا");
  }

  function isNotStarted(value){
    return normalizeArabic(value).includes("لم يبدا");
  }

  function safeCssClass(value){
    const v = String(value || "").toLowerCase();
    if (v === "valid" || v === "warning" || v === "invalid" || v === "not_found") return v;
    return "invalid";
  }

  function playSound(type){
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.connect(gain);
      gain.connect(ctx.destination);

      if(type === "valid") osc.frequency.value = 900;
      else if(type === "warning") osc.frequency.value = 600;
      else osc.frequency.value = 300;

      gain.gain.setValueAtTime(.001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(.08, ctx.currentTime + .01);
      gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .25);

      osc.start();
      osc.stop(ctx.currentTime + .25);
    }catch(e){}
  }

  function renderError(message){
    document.getElementById("app").innerHTML = `
      <div class="error-wrap">
        <div class="error-card">
          <img class="madaar-card-logo" src="../ASSETS/madaar-logo-final.png" alt="Madaar Logo">
          <div class="error-head">
            <h1>تعذر تحميل التصريح</h1>
          </div>
          <div class="error-body">
            <div class="error-msg">${escapeHtml(message || "التصريح غير صالح")}</div>
            <div class="error-sub">يرجى التحقق من الرابط أو إعادة المحاولة من داخل النظام.</div>
          </div>
        </div>
      </div>
    `;
  }

  function renderUnauthorized(){
    renderError("هذه الصفحة متاحة من داخل النظام فقط");
  }

  function buildBadges(d){
    let badges = "";
    if(isUnpaid(d.paymentArabic)){
      badges += `<div class="badge">Payment Review</div>`;
    }
    if(isLastValidDay(d.statusArabic)){
      badges += `<div class="badge">Last Valid Day</div>`;
    }
    if(isStartsTomorrow(d.statusArabic)){
      badges += `<div class="badge">Starts Tomorrow</div>`;
    }
    if(isNotStarted(d.statusArabic)){
      badges += `<div class="badge">Not Started Yet</div>`;
    }
    return badges;
  }

  function loadPermit(){
    if(!secureToken){
      renderError("Secure token is missing.");
      return;
    }

    if(!getSessionToken()){
      renderUnauthorized();
      return;
    }

    AzhaPermitService.scanToken(secureToken, pageMode)
      .then(res => {
        if(!res || !res.success || !res.data){
          renderError((res && res.message) || "التصريح غير صالح");
          return;
        }

        renderPermit(res.data);
      })
      .catch(() => {
        renderError("حدث خطأ أثناء تحميل بيانات التصريح");
      });
  }

  function renderPermit(d){
    playSound(d.validityClass);

    const badges = buildBadges(d);
    const validityClass = safeCssClass(d.validityClass);

    document.getElementById("app").innerHTML = `
      <div class="shell">
        <div class="card">
          <img class="madaar-card-logo" src="../ASSETS/madaar-logo-final.png" alt="Madaar Logo">
          <div class="watermark">AZHA</div>

          <div class="header">
            <div class="badge-top">Secure Token Verification / التحقق بالرمز الآمن</div>
            <h1>Security Permit View</h1>
            <div class="sub">Permit ID / رقم التصريح: ${escapeHtml(d.permitId || "-")}</div>
          </div>

          <div class="scan-line"></div>

          <div class="validity ${escapeHtml(validityClass)}">
            ${escapeHtml(d.validityText)}
          </div>

          <div class="note-box">
            ${escapeHtml(d.validityNote || "يُسمح بالمرور بعد مطابقة البيانات.")}
          </div>

          <div class="badges">${badges}</div>

          <div class="grid">
            <div class="item">
              <div class="label">Tenant / المستأجر</div>
              <div class="value">${escapeHtml(d.tenant || "-")}</div>
            </div>

            <div class="item">
              <div class="label">Unit / الوحدة</div>
              <div class="value">${escapeHtml(d.unit || "-")}</div>
            </div>

            <div class="item">
              <div class="label">Start Date / البداية</div>
              <div class="value">${escapeHtml(d.startDate || "-")}</div>
            </div>

            <div class="item">
              <div class="label">End Date / النهاية</div>
              <div class="value">${escapeHtml(d.endDate || "-")}</div>
            </div>

            <div class="item">
              <div class="label">Guests Count / عدد الأفراد</div>
              <div class="value">${escapeHtml(d.tenantCount || "-")}</div>
            </div>

            <div class="item">
              <div class="label">Car Plate / السيارة</div>
              <div class="value">${escapeHtml(d.carPlate || "-")}</div>
            </div>

            <div class="item">
              <div class="label">Payment / السداد</div>
              <div class="value">${escapeHtml(d.paymentArabic || "-")}</div>
            </div>

            <div class="item">
              <div class="label">Status / الحالة</div>
              <div class="value">${escapeHtml(d.statusArabic || "-")}</div>
            </div>
          </div>

          <div class="meta">
            <div class="meta-pill">${pageMode === "preview" ? "Preview Mode" : "Secure Verification"}</div>
            <div class="meta-pill">${escapeHtml(d.statusArabic || "-")}</div>
            <div class="meta-pill">${escapeHtml(d.paymentArabic || "-")}</div>
          </div>

          <div class="actions">
            <button class="btn primary" onclick="location.reload()">Refresh / تحديث</button>
            <button class="btn light" onclick="openClientCard('${escapeHtml(d.clientUrl || "")}')">Client Card</button>
            <button class="btn soft" onclick="goBack()">Back / رجوع</button>
          </div>

          <div class="time">
            Last Update / آخر تحديث: ${escapeHtml(new Date().toLocaleString())}
          </div>
        </div>
      </div>
    `;
  }

  window.openClientCard = function(url){
    if(!url) return;
    window.open(url, "_blank", "noopener,noreferrer");
  };

  window.goBack = function(){
    if(document.referrer){
      history.back();
      return;
    }

    const role = getRole();
    const routes = (window.AZHA_CONFIG && AZHA_CONFIG.ROUTES) || {};
    const dashboardRoute = routes.dashboard || "/dashboard";
    const gateRoute = routes.gate || "/gate";

    location.href = (role === "admin" || role === "supervisor" || role === "viewer") ? dashboardRoute : gateRoute;
  };

  loadPermit();
})();
</script>





<script id="azha-optional-security-verification-panel-final">
(function(){
  function params(){return new URLSearchParams(location.search);}
  function esc(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");}
  function apiBase(){return (window.AZHA_CONFIG && (window.AZHA_CONFIG.API_BASE || (window.AZHA_CONFIG.API && window.AZHA_CONFIG.API.BASE_URL))) || "https://azha-backend-production.up.railway.app/api";}
  function splitNames(d){

<script id="azha-present-guests-tracking-final">
(function(){
  function tokenKey(){
    const q = new URLSearchParams(location.search);
    return "azha-present-guests-" + (q.get("token") || "unknown");
  }

  function nowText(){
    const d = new Date();
    return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  }

  function getState(){
    try { return JSON.parse(localStorage.getItem(tokenKey()) || "{}"); }
    catch(e){ return {}; }
  }

  function setState(state){
    localStorage.setItem(tokenKey(), JSON.stringify(state || {}));
  }

  function enhancePresence(){
    const panel =
      document.getElementById("azhaSecurityVerificationPanel") ||
      document.querySelector(".scanner-verification-panel") ||
      document.querySelector(".identity-check-section");

    if(!panel || panel.dataset.presenceTracking === "1") return;

    const rows = Array.from(panel.querySelectorAll(".svp-row, .identity-person-row"));
    if(!rows.length) return;

    panel.dataset.presenceTracking = "1";

    const state = getState();

    rows.forEach(function(row){
      const nameEl = row.querySelector(".svp-name") || row.querySelector("span:last-child");
      if(!nameEl) return;

      const rawName = nameEl.textContent.trim();
      const cleanName = rawName.replace(/^\d+\.\s*/, "").trim();

      let status = row.querySelector(".presence-status");
      if(!status){
        status = document.createElement("small");
        status.className = "presence-status";
        row.appendChild(status);
      }

      function render(){
        if(state[cleanName]){
          row.classList.add("checked");
          const check = row.querySelector(".svp-check,.check-box");
          if(check) check.textContent = "☑";
          status.textContent = "دخل " + state[cleanName];
        }else{
          row.classList.remove("checked");
          const check = row.querySelector(".svp-check,.check-box");
          if(check) check.textContent = "☐";
          status.textContent = "لم تصل بعد";
        }
      }

      row.addEventListener("click", function(){
        if(state[cleanName]){
          delete state[cleanName];
        }else{
          state[cleanName] = nowText();
        }
        setState(state);
        render();
        updateSummary();
      });

      render();
    });

    const summary = document.createElement("div");
    summary.className = "presence-summary";
    panel.insertBefore(summary, panel.firstChild);

    function updateSummary(){
      const total = rows.length;
      const present = Object.keys(getState()).length;
      summary.textContent = "Present Guests: " + present + " / " + total;
      summary.classList.toggle("done", present > 0);
    }

    const complete =
      panel.querySelector(".svp-complete") ||
      panel.querySelector(".identity-complete-btn");

    if(complete){
      complete.textContent = "Save Present Guests";
      complete.onclick = function(e){
        e.preventDefault();
        const present = Object.keys(getState()).length;
        if(present === 0){
          alert("يرجى تحديد شخص واحد على الأقل");
          return false;
        }
        complete.textContent = "Present Guests Saved ✓";
        complete.classList.add("done");
        return false;
      };
    }

    updateSummary();
  }

  document.addEventListener("DOMContentLoaded", function(){
    setTimeout(enhancePresence, 600);
    setTimeout(enhancePresence, 1400);
    setTimeout(enhancePresence, 2600);
  });
})();
</script>

<script id="azha-permit-validity-hard-lock">
(function(){
  function ymd(v){
    const m = String(v || "").match(/(\d{4})-(\d{2})-(\d{2})/);
    return m ? m[1]+"-"+m[2]+"-"+m[3] : "";
  }

  function today(){
    const d = new Date();
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }

  function compute(start,end){
    const s = ymd(start), e = ymd(end), t = today();
    if(!s || !e) return null;
    if(t > e) return {ar:"التصريح منتهي", en:"Permit expired", cls:"invalid"};
    if(t < s) return {ar:"لم يبدأ بعد", en:"Not started yet", cls:"warning"};
    if(t === e) return {ar:"آخر يوم ساري", en:"Last valid day", cls:"warning"};
    return {ar:"صالح للدخول", en:"Valid for entry", cls:"valid"};
  }

  function splitNames(raw){
    return String(raw || "")
      .split(/\s*\/\s*|\s+-\s+|[-–—•]+|[,،\n]+/g)
      .map(x=>x.trim())
      .filter(Boolean);
  }

  function apply(){
    const txt = document.body.innerText || "";
    const dates = Array.from(txt.matchAll(/\d{4}-\d{2}-\d{2}/g)).map(x=>x[0]);
    if(dates.length < 2) return;

    const result = compute(dates[0], dates[1]);
    if(!result) return;

    const all = Array.from(document.querySelectorAll("*"));

    all.forEach(el=>{
      const t = (el.textContent || "").trim();
      if(["صالح للدخول","التصريح منتهي","Permit expired","Valid for entry","لم يبدأ بعد","آخر يوم ساري"].includes(t)){
        if(t.includes("Valid") || t.includes("expired") || t.includes("Not") || t.includes("Last")){
          el.textContent = result.en;
        }else{
          el.textContent = result.ar;
        }
      }
    });

    document.body.classList.remove("permit-valid","permit-warning","permit-invalid");
    document.body.classList.add("permit-" + result.cls);
  }

  document.addEventListener("DOMContentLoaded", function(){
    setTimeout(apply,300);
    setTimeout(apply,900);
    setTimeout(apply,1800);
  });
})();
</script>

    const now = new Date();
    const t = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");

    if(s && e){
      if(t > e) return {cls:"invalid", ar:"التصريح منتهي", en:"Permit expired"};

      return {cls:"valid", ar:"صالح للدخول", en:"Valid for entry"};
    }

    const cls = String(d.validityClass || "").toLowerCase();
    if(cls === "valid") return {cls:"valid", ar:d.validityText||"صالح للدخول", en:"Valid for entry"};
    if(cls === "warning") return {cls:"warning", ar:d.validityText||"تحذير", en:"Warning"};

    if(!s || !e) return null;

    if(t > e) return {cls:"invalid", ar:"التصريح منتهي", en:"Permit expired"};
    if(t < s) return {cls:"warning", ar:"لم يبدأ بعد", en:"Not started yet"};
    if(t === e) return {cls:"warning", ar:"آخر يوم ساري", en:"Last valid day"};
    return {cls:"valid", ar:"صالح للدخول", en:"Valid for entry"};
  }

  function apply(){

    // 🧠 نجيب التواريخ من الصفحة
    const txt = document.body.innerText || "";
    const dates = Array.from(txt.matchAll(/\d{4}-\d{2}-\d{2}/g)).map(x=>x[0]);

    if(dates.length < 2) return;

    const result = compute(dates[0], dates[1]);
    if(!result) return;

    // 🔥 امسح أي classes قديمة
    document.body.className = document.body.className
      .replace(/permit-valid|permit-warning|permit-invalid/g,"");

    document.body.classList.add("permit-" + result.cls);

    // 🔥 امسح أي لون غلط
    document.querySelectorAll("*").forEach(el=>{
      el.style.background = "";
      el.style.color = "";
    });

    // 🔥 عدل النصوص
    document.querySelectorAll("*").forEach(el=>{
      const t = (el.textContent || "").trim();

      if([
        "صالح للدخول",
        "التصريح منتهي",
        "Permit expired",
        "Valid for entry",
        "لم يبدأ بعد",
        "آخر يوم ساري"
      ].includes(t)){
        el.textContent = /[A-Za-z]/.test(t) ? result.en : result.ar;
      }
    });

  }

  // 🔥 نكرر override عشان نكسر أي script تاني
  setTimeout(apply,200);
  setTimeout(apply,800);
  setTimeout(apply,1600);
  setTimeout(apply,3000);

})();
</script>


<script id="azha-verification-stable-server-connected">
(function(){
  function q(){ return new URLSearchParams(location.search); }

  function apiBase(){
    return (window.AZHA_CONFIG && (window.AZHA_CONFIG.API_BASE || (window.AZHA_CONFIG.API && window.AZHA_CONFIG.API.BASE_URL))) ||
      "https://azha-backend-production.up.railway.app/api";
  }

  function presenceUrl(){
    return apiBase().replace(/\/api\/?$/, "/api/presence");
  }

  function esc(v){
    return String(v||"")
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#039;");
  }

  function splitNames(raw){
    return String(raw || "")
      .split(/\s*\/\s*|\s+-\s+|[-–—•]+|[,،\n]+/g)
      .map(x => x.trim())
      .filter(Boolean);
  }

  function getToken(){ return q().get("token") || ""; }

  function context(){
    return {
      token: getToken(),
      sessionToken: q().get("sessionToken") || localStorage.getItem("sessionToken") || "",
      securityUsername: localStorage.getItem("sessionUsername") || sessionStorage.getItem("sessionUsername") || "",
      gateName: localStorage.getItem("sessionGateName") || sessionStorage.getItem("sessionGateName") || ""
    };
  }

  async function fetchPermit(){
    const token = getToken();
    if(!token) return null;

    try{
      const qs = new URLSearchParams({ action:"getClientPermit", token, _t:Date.now() });
      const res = await fetch(apiBase() + "?" + qs.toString(), { cache:"no-store" });
      const json = await res.json();
      return json && json.success ? json.data : null;
    }catch(e){
      return null;
    }
  }

  async function fetchPresence(){
    const token = getToken();
    if(!token) return {};

    try{
      const res = await fetch(presenceUrl() + "?token=" + encodeURIComponent(token) + "&_t=" + Date.now(), { cache:"no-store" });
      const json = await res.json();
      const latest = {};
      if(json && json.success && Array.isArray(json.data)){
        json.data.forEach(x => {
          if(x.guestName) latest[x.guestName] = x;
        });
      }
      return latest;
    }catch(e){
      return {};
    }
  }

  async function postPresence(name, present, data){
    const ctx = context();

    try{
      await fetch(presenceUrl(), {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
          token: ctx.token,
          permitId: data.permitId || "",
          unit: data.unit || "",
          guestName: name,
          present,
          sessionToken: ctx.sessionToken,
          securityUsername: ctx.securityUsername,
          gateName: ctx.gateName
        })
      });
    }catch(e){}
  }

  function removeDuplicates(){
    document.querySelectorAll("#azhaStableVerificationWrap").forEach((x,i)=>{ if(i>0) x.remove(); });
  }

  async function build(){
    if(!(q().get("from") === "scanner" || q().get("mode") === "security" || q().get("app") === "1")) return;

    removeDuplicates();
    if(document.getElementById("azhaStableVerificationWrap")) return;

    const data = await fetchPermit();
    if(!data) return;

    const names = splitNames(data.tenantsNames || data.tenantNames || data.guestsNames || data.guests || data.tenant || "");
    if(!names.length) return;

    const saved = await fetchPresence();

    const target =
      document.querySelector(".card") ||
      document.querySelector(".permit-card") ||
      document.querySelector("#app") ||
      document.body;

    const wrap = document.createElement("div");
    wrap.id = "azhaStableVerificationWrap";
    wrap.innerHTML = `
      <button type="button" class="azha-v-toggle">Show Identity Verification</button>

      <section class="azha-v-panel azha-v-hidden">
        <div class="azha-v-head">
          <div class="azha-v-title">Identity Verification</div>
          <div class="azha-v-sub">يرجى تحديد الأشخاص الموجودين فعليًا أمام الأمن فقط</div>
        </div>

        <div class="azha-v-summary">Present Guests: 0 / ${names.length}</div>

        <div class="azha-v-list">
          ${names.map((n,i)=>`
            <button type="button" class="azha-v-row" data-name="${esc(n)}">
              <span class="azha-v-check">☐</span>
              <span class="azha-v-name">${i+1}. ${esc(n)}</span>
              <small class="azha-v-status">لم تصل بعد</small>
            </button>
          `).join("")}
        </div>

        <button type="button" class="azha-v-save">Save Present Guests</button>
      </section>
    `;

    target.appendChild(wrap);

    const toggle = wrap.querySelector(".azha-v-toggle");
    const panel = wrap.querySelector(".azha-v-panel");
    const rows = Array.from(wrap.querySelectorAll(".azha-v-row"));
    const summary = wrap.querySelector(".azha-v-summary");
    const save = wrap.querySelector(".azha-v-save");

    function update(){
      const checked = rows.filter(r => r.classList.contains("checked")).length;
      summary.textContent = "Present Guests: " + checked + " / " + rows.length;
      summary.classList.toggle("done", checked > 0);
    }

    function mark(row, present, timeText){
      row.classList.toggle("checked", present);
      row.querySelector(".azha-v-check").textContent = present ? "☑" : "☐";
      row.querySelector(".azha-v-status").textContent = present ? ("دخل " + timeText) : "لم تصل بعد";
      update();
    }

    rows.forEach(row => {
      const name = row.dataset.name;
      const old = saved[name];

      if(old && old.present){
        mark(row, true, new Date(old.timestamp).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}));
      }

      row.addEventListener("click", async function(){
        const present = !row.classList.contains("checked");
        const time = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
        mark(row, present, time);
        await postPresence(name, present, data);
      });
    });

    toggle.addEventListener("click", function(){
      panel.classList.toggle("azha-v-hidden");
      toggle.textContent = panel.classList.contains("azha-v-hidden") ? "Show Identity Verification" : "Hide Identity Verification";
      if(!panel.classList.contains("azha-v-hidden")) panel.scrollIntoView({behavior:"smooth", block:"start"});
    });

    save.addEventListener("click", function(){
      const checked = rows.filter(r => r.classList.contains("checked")).length;
      if(checked === 0){
        alert("يرجى تحديد شخص واحد على الأقل");
        return;
      }
      save.textContent = "Present Guests Saved ✓";
      save.classList.add("done");
    });

    update();
  }

  document.addEventListener("DOMContentLoaded", function(){
    setTimeout(build, 500);
    setTimeout(build, 1500);
    setTimeout(build, 3000);
  });
})();
</script>
